name: Deploy GitHub Pages (fund)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    # 交易日盘中每30分钟重建（UTC 01:30-07:00 = 北京时间 09:30-15:00）
    # 周末 GitHub 也会触发，但消耗在免费额度内（约 20 runs/天 × 2min ≈ 40min/天）
    - cron: "30 1 * * 1-5"
    - cron: "0 2 * * 1-5"
    - cron: "30 2 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "0 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # fund_monitor 在本环境下可能会触发 requests 等依赖；这里显式安装可降低“模块缺失”的风险。
          python -m pip install requests

      - name: Build static pages
        run: python build_pages.py
        working-directory: ./

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify with Playwright (browser automation)
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          OUT_DIR: artifacts/pages-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          echo "PAGE_URL=$PAGE_URL"
          mkdir -p "$OUT_DIR"

          # 为了不引入 package.json，这里直接临时安装 playwright
          npm init -y
          npm i playwright
          npx playwright install chromium
          node ./pages_verify.mjs "$PAGE_URL" "$OUT_DIR"

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pages-verify-${{ github.run_id }}
          path: artifacts/pages-${{ github.run_id }}-${{ github.run_attempt }}

